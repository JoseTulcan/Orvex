<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%236C63FF'/><text x='50' y='67' font-family='Arial Black,sans-serif' font-size='52' font-weight='900' text-anchor='middle' fill='white'>O</text></svg>">
<title>ORVEX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808; --surface: #111111; --surface2: #1a1a1a;
    --accent: #6C63FF; --accent2: #5A52E0; --text: #f0ece4; --muted: #888880;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; opacity:0.4; }

  /* HEADER */
  header { position:sticky; top:0; z-index:100; background:rgba(8,8,8,0.92); backdrop-filter:blur(12px); border-bottom:1px solid rgba(108,99,255,0.15); padding:0 2rem; height:64px; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.12em; color:var(--accent); text-decoration:none; flex-shrink:0; }
  .logo span { color:var(--text); }
  .search-wrap { position:relative; flex:1; max-width:400px; }
  .search-wrap input { width:100%; background:var(--surface2); border:1px solid rgba(255,255,255,0.08); border-radius:2px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:300; padding:0.55rem 2.5rem 0.55rem 1rem; outline:none; transition:border-color 0.2s; }
  .search-wrap input:focus { border-color:rgba(108,99,255,0.4); }
  .search-wrap input::placeholder { color:var(--muted); }
  .search-icon { position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); color:var(--muted); font-size:1rem; cursor:pointer; transition:color 0.2s; }
  .search-icon:hover { color:var(--accent); }
  nav { display:flex; gap:0.25rem; flex-shrink:0; }
  nav button { background:transparent; border:1px solid transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:400; letter-spacing:0.08em; text-transform:uppercase; padding:0.4rem 0.75rem; border-radius:2px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  nav button:hover { color:var(--text); border-color:rgba(255,255,255,0.1); }
  nav button.active { color:var(--accent); border-color:rgba(108,99,255,0.3); }

  /* TYPE TOGGLE */
  .type-toggle { display:flex; gap:0; border:1px solid rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; flex-shrink:0; }
  .type-btn { background:transparent; border:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:0.4rem 1rem; cursor:pointer; transition:all 0.2s; }
  .type-btn.active { background:var(--accent); color:#fff; }

  /* HERO */
  #hero { position:relative; height:72vh; min-height:440px; overflow:hidden; display:flex; align-items:flex-end; cursor:pointer; }
  #hero-bg { position:absolute; inset:0; background-size:cover; background-position:center top; transition:opacity 0.8s ease; transform:scale(1.04); }
  #hero::after { content:''; position:absolute; inset:0; background:linear-gradient(to top, rgba(8,8,8,1) 0%, rgba(8,8,8,0.5) 45%, rgba(8,8,8,0.05) 100%); }
  #hero-content { position:relative; z-index:2; padding:2.5rem; max-width:700px; animation:fadeUp 0.6s ease both; }
  .hero-badge { display:inline-block; background:var(--accent); color:#fff; font-size:0.7rem; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; padding:0.3rem 0.75rem; margin-bottom:0.75rem; }
  #hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.5rem,6vw,5rem); line-height:0.95; letter-spacing:0.04em; color:var(--text); margin-bottom:0.75rem; }
  #hero-meta { color:var(--muted); font-size:0.85rem; margin-bottom:0.6rem; }
  #hero-overview { font-size:0.9rem; line-height:1.6; color:rgba(240,236,228,0.75); max-width:520px; margin-bottom:1.25rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .hero-actions { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; }

  /* BUTTONS */
  .btn-primary { background:var(--accent); color:#fff; border:none; font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:0.65rem 1.5rem; cursor:pointer; transition:background 0.2s,transform 0.15s; display:inline-flex; align-items:center; gap:0.5rem; }
  .btn-primary:hover { background:var(--accent2); transform:translateY(-1px); }
  .btn-secondary { background:rgba(255,255,255,0.08); color:var(--text); border:1px solid rgba(255,255,255,0.12); font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:400; letter-spacing:0.08em; text-transform:uppercase; padding:0.65rem 1.25rem; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:0.5rem; }
  .btn-secondary:hover { background:rgba(255,255,255,0.14); }
  .btn-ver { background:#1a6aff; color:#fff; border:none; font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:0.65rem 1.5rem; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:0.5rem; }
  .btn-ver:hover { background:#1457d4; transform:translateY(-1px); }
  .btn-yt { background:#ff3333; color:#fff; border:none; font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:400; letter-spacing:0.08em; text-transform:uppercase; padding:0.65rem 1rem; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:0.4rem; }
  .btn-yt:hover { background:#cc0000; }

  /* FILTER BAR */
  .filter-bar { padding:1.25rem 2rem 0; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
  .filter-bar .section-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.1em; color:var(--text); white-space:nowrap; }
  .genre-pills { display:flex; gap:0.5rem; overflow-x:auto; padding:0.75rem 2rem 0.5rem; scrollbar-width:none; }
  .genre-pills::-webkit-scrollbar { display:none; }
  .pill { background:var(--surface2); border:1px solid rgba(255,255,255,0.08); color:var(--muted); font-size:0.82rem; font-weight:400; letter-spacing:0.04em; padding:0.45rem 1.1rem; border-radius:100px; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
  .pill:hover { color:var(--text); border-color:rgba(255,255,255,0.18); }
  .pill.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:500; }

  /* NETFLIX ROWS */
  .netflix-section { margin-bottom:0.5rem; }
  .row-header { padding:1.5rem 2rem 0.75rem; display:flex; align-items:center; justify-content:space-between; }
  .row-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:0.08em; color:var(--text); }
  .row-see-all { font-size:0.75rem; color:var(--accent); cursor:pointer; letter-spacing:0.06em; text-transform:uppercase; border:none; background:none; font-family:'DM Sans',sans-serif; }
  .row-see-all:hover { text-decoration:underline; }
  .row-scroll { display:flex; gap:8px; overflow-x:auto; padding:0 2rem 1rem; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent; }
  .row-scroll::-webkit-scrollbar { height:3px; }
  .row-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

  /* GRID MODE */
  .movies-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:1px; padding:0 2rem 3rem; margin-top:0.5rem; }

  /* CARD */
  .movie-card { position:relative; flex-shrink:0; width:155px; aspect-ratio:2/3; overflow:hidden; cursor:pointer; background:var(--surface); }
  .movie-card.grid-card { width:auto; }
  .movie-card img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.4s ease,filter 0.4s ease; filter:brightness(0.9); }
  .movie-card:hover img { transform:scale(1.06); filter:brightness(0.45); }
  .card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(8,8,8,0.97) 0%,rgba(8,8,8,0.3) 55%,transparent 100%); display:flex; flex-direction:column; justify-content:flex-end; padding:0.75rem; opacity:0; transition:opacity 0.3s ease; }
  .movie-card:hover .card-overlay { opacity:1; }
  .card-title { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; letter-spacing:0.05em; color:var(--text); line-height:1.1; margin-bottom:0.3rem; }
  .card-meta { font-size:0.7rem; color:var(--muted); display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
  .card-rating { color:var(--accent); font-weight:500; }
  .card-type-badge { font-size:0.62rem; background:rgba(108,99,255,0.15); color:var(--accent); border:1px solid rgba(108,99,255,0.2); padding:0.1rem 0.4rem; border-radius:2px; letter-spacing:0.06em; text-transform:uppercase; }
  .card-play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.8); width:44px; height:44px; border:2px solid var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:1rem; opacity:0; transition:all 0.3s ease; }
  .movie-card:hover .card-play { opacity:1; transform:translate(-50%,-50%) scale(1); }
  .no-poster { width:100%; height:100%; background:var(--surface2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.4rem; color:var(--muted); font-size:0.7rem; text-align:center; padding:0.75rem; transition:filter 0.4s; }
  .no-poster-icon { font-size:1.8rem; opacity:0.3; }
  .movie-card:hover .no-poster { filter:brightness(0.45); }

  /* SKELETON */
  .skeleton { background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; flex-shrink:0; width:155px; aspect-ratio:2/3; }
  .skeleton.grid-skel { width:auto; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* MODAL */
  #modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); backdrop-filter:blur(10px); z-index:200; display:none; align-items:center; justify-content:center; padding:1rem; }
  #modal-overlay.open { display:flex; }
  #modal { background:var(--surface); border:1px solid rgba(255,255,255,0.06); width:100%; max-width:880px; max-height:92vh; overflow-y:auto; position:relative; animation:modalIn 0.3s ease both; }
  @keyframes modalIn { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-close { position:absolute; top:1rem; right:1rem; width:36px; height:36px; background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.1); color:var(--text); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; transition:background 0.2s; border-radius:50%; }
  .modal-close:hover { background:rgba(255,255,255,0.12); }

  /* TRAILER AREA */
  .trailer-area { position:relative; width:100%; background:#000; }
  #modal-backdrop { width:100%; aspect-ratio:16/7; object-fit:cover; object-position:center top; display:block; filter:brightness(0.75); }
  .backdrop-placeholder { width:100%; aspect-ratio:16/7; background:var(--surface2); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:0.8rem; }
  #trailer-frame { width:100%; aspect-ratio:16/9; border:none; display:none; }
  .trailer-error-msg { display:none; background:#111; padding:1.5rem 2rem; text-align:center; }
  .trailer-error-msg p { color:var(--muted); font-size:0.85rem; margin-bottom:1rem; }

  /* MODAL BODY */
  .modal-body { padding:1.5rem 2rem 2rem; }
  .modal-top { display:flex; gap:1.5rem; margin-bottom:1.25rem; }
  .modal-poster { width:110px; flex-shrink:0; aspect-ratio:2/3; object-fit:cover; border:1px solid rgba(255,255,255,0.06); }
  .modal-poster-ph { width:110px; flex-shrink:0; aspect-ratio:2/3; background:var(--surface2); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:1.5rem; border:1px solid rgba(255,255,255,0.06); }
  .modal-info { flex:1; }
  #modal-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.05em; margin-bottom:0.25rem; line-height:1; }
  #modal-tagline { font-style:italic; color:var(--muted); font-size:0.82rem; margin-bottom:0.75rem; }
  .modal-stats { display:flex; flex-wrap:wrap; gap:1rem 1.5rem; margin-bottom:0.75rem; font-size:0.8rem; }
  .stat { display:flex; flex-direction:column; gap:2px; }
  .stat-label { color:var(--muted); font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; }
  .stat-value { color:var(--text); }
  .stat-value.gold { color:var(--accent); }
  .modal-genres { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:0; }
  .genre-tag { font-size:0.7rem; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); border:1px solid rgba(255,255,255,0.08); padding:0.22rem 0.6rem; border-radius:2px; }
  .modal-overview-section { margin:1.25rem 0; }
  .modal-overview-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-bottom:0.5rem; }
  #modal-overview { font-size:0.88rem; line-height:1.75; color:rgba(240,236,228,0.8); border-left:2px solid var(--accent); padding-left:1rem; }
  .modal-actions { display:flex; gap:0.6rem; flex-wrap:wrap; margin-top:1.25rem; }
  .providers-section { margin-top:1.25rem; }
  .providers-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-bottom:0.6rem; }
  .providers-row { display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center; }
  .provider-btn { display:inline-flex; align-items:center; gap:0.5rem; background:var(--surface2); border:1px solid rgba(255,255,255,0.08); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:400; padding:0.45rem 0.9rem 0.45rem 0.5rem; cursor:pointer; border-radius:3px; transition:all 0.2s; text-decoration:none; white-space:nowrap; }
  .provider-btn:hover { border-color:var(--accent); background:rgba(108,99,255,0.12); transform:translateY(-1px); }
  .provider-btn img { width:24px; height:24px; border-radius:4px; object-fit:cover; flex-shrink:0; }
  .provider-btn .pname { max-width:100px; overflow:hidden; text-overflow:ellipsis; }

  /* TOAST */
  #toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--surface2); border:1px solid rgba(108,99,255,0.2); color:var(--text); font-size:0.82rem; padding:0.65rem 1.25rem; z-index:500; transition:transform 0.3s ease; white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  /* LOADER */
  #loader { display:none; text-align:center; padding:3rem; }
  .spinner { width:32px; height:32px; border:2px solid rgba(108,99,255,0.15); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* LOAD MORE */
  #load-more-wrap { text-align:center; padding:0 2rem 3rem; display:none; }
  #load-more { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.7rem 2.5rem; cursor:pointer; transition:all 0.2s; }
  #load-more:hover { border-color:var(--accent); color:var(--accent); }

  .empty-state { text-align:center; padding:5rem 2rem; color:var(--muted); }
  .empty-icon { font-size:3rem; margin-bottom:1rem; opacity:0.3; }
  .empty-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.1em; color:var(--text); margin-bottom:0.5rem; }

  @keyframes fadeUp { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }

  @media(max-width:650px){
    header { padding:0 1rem; gap:0.5rem; }
    nav button { font-size:0.7rem; padding:0.35rem 0.5rem; }
    .movies-grid { padding:0 1rem 3rem; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); }
    .filter-bar,.genre-pills,.row-header { padding-left:1rem; padding-right:1rem; }
    .row-scroll { padding-left:1rem; padding-right:1rem; }
    #hero-content { padding:1.5rem; }
    .modal-body { padding:1rem 1.25rem 1.5rem; }
    .modal-top { flex-direction:column; }
    .modal-poster,.modal-poster-ph { width:80px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#" onclick="goHome()"><span style="display:inline-block;width:22px;height:22px;border:2.5px solid var(--accent);border-radius:50%;margin-right:6px;vertical-align:middle;position:relative;top:-2px;background:transparent"></span><span>ORV</span>EX</a>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Buscar películas y series..." autocomplete="off">
    <span class="search-icon" id="search-btn">⌕</span>
  </div>
  <div class="type-toggle">
    <button class="type-btn active" data-type="movie" onclick="switchType('movie',this)">Películas</button>
    <button class="type-btn" data-type="tv" onclick="switchType('tv',this)">Series</button>
  </div>
  <nav>
    <button class="active" data-cat="popular">Popular</button>
    <button data-cat="now_playing" data-tv-cat="on_the_air">En emisión</button>
    <button data-cat="top_rated">Top</button>
    <button data-cat="upcoming" data-tv-cat="airing_today">Próximas</button>
  </nav>
</header>

<section id="hero" onclick="openHeroModal()">
  <div id="hero-bg"></div>
  <div id="hero-content">
    <div class="hero-badge" id="hero-badge">Destacada</div>
    <div id="hero-title">Cargando...</div>
    <div id="hero-meta"></div>
    <div id="hero-overview"></div>
    <div class="hero-actions">
      <button class="btn-primary" onclick="event.stopPropagation();playHeroTrailer()">▶ Tráiler</button>
      <button class="btn-secondary" onclick="event.stopPropagation();openHeroModal()">Más info</button>
    </div>
  </div>
</section>

<!-- HOME: Netflix rows -->
<div id="home-rows"></div>

<!-- FILTER MODE -->
<div id="filter-mode" style="display:none">
  <div class="filter-bar">
    <span class="section-title" id="section-title">Popular</span>
  </div>
  <div class="genre-pills" id="genre-pills">
    <div class="pill active" data-genre="" onclick="selectGenre('',this)">Todos</div>
  </div>
  <div class="movies-grid" id="movies-grid"></div>
  <div id="loader"><div class="spinner"></div></div>
  <div id="load-more-wrap"><button id="load-more" onclick="loadMoreGrid()">Cargar más</button></div>
</div>

<!-- SEARCH RESULTS -->
<div id="search-mode" style="display:none">
  <div class="filter-bar"><span class="section-title" id="search-title">Resultados</span></div>
  <div class="movies-grid" id="search-grid"></div>
  <div id="search-loader"><div style="text-align:center;padding:3rem"><div class="spinner"></div></div></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="trailer-area">
      <img id="modal-backdrop" src="" alt="" onerror="this.style.display='none'">
      <div id="modal-backdrop-ph" class="backdrop-placeholder" style="display:none">🎬</div>
      <iframe id="trailer-frame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
      <div class="trailer-error-msg" id="trailer-error">
        <p>El tráiler no se puede reproducir en este reproductor.<br>Puedes verlo directamente en YouTube.</p>
        <button class="btn-yt" id="yt-fallback-btn">▶ Ver en YouTube</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-top">
        <img id="modal-poster" class="modal-poster" src="" alt="" onerror="this.style.display='none';document.getElementById('modal-poster-ph').style.display='flex'">
        <div id="modal-poster-ph" class="modal-poster-ph" style="display:none">🎬</div>
        <div class="modal-info">
          <div id="modal-title" class="modal-title">Cargando...</div>
          <div id="modal-tagline" class="modal-tagline"></div>
          <div id="modal-stats" class="modal-stats"></div>
          <div id="modal-genres" class="modal-genres"></div>
        </div>
      </div>
      <div class="modal-overview-section">
        <div class="modal-overview-label">Sinopsis</div>
        <div id="modal-overview"></div>
      </div>
      <div class="modal-actions" id="modal-actions"></div>
      <div class="providers-section" id="providers-section" style="display:none">
        <div class="providers-label">Disponible en</div>
        <div class="providers-row" id="providers-row"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_KEY = '826a6fb59762bb2d6acfbd574fff9230';
const BASE = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';
const IMG_BIG = 'https://image.tmdb.org/t/p/original';

let currentType = 'movie'; // 'movie' | 'tv'
let currentCat = 'popular';
let currentGenre = '';
let currentPage = 1;
let totalPages = 1;
let heroItem = null;
let allGenres = { movie:{}, tv:{} };
let genresPillsBuilt = { movie:false, tv:false };
let currentTrailerKey = null;
let currentImdbId = null;
let currentPlayImdbUrl = null;
let isSearchMode = false;
let isFilterMode = false;
let userCountry = 'US'; // default fallback

// ─── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([detectCountry(), loadGenres('movie'), loadGenres('tv')]);
  buildGenrePills();
  loadHomeRows();
}

async function detectCountry() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d.country_code) userCountry = d.country_code;
  } catch(e) {
    // keep default 'US' — works for most providers
  }
}

// ─── GENRES ─────────────────────────────────────────────────────────────────
async function loadGenres(type) {
  try {
    const r = await fetch(`${BASE}/genre/${type}/list?api_key=${API_KEY}&language=es`);
    const d = await r.json();
    d.genres.forEach(g => allGenres[type][g.id] = g.name);
  } catch(e) {}
}

function buildGenrePills() {
  const pills = document.getElementById('genre-pills');
  // clear dynamic pills
  [...pills.querySelectorAll('[data-dynamic]')].forEach(p=>p.remove());
  const genres = allGenres[currentType];
  const extras = currentType === 'tv'
    ? [{ id:'korean', name:'🇰🇷 Coreano' }]
    : [];
  const all = [...extras, ...Object.entries(genres).map(([id,name])=>({id,name}))];
  all.forEach(g => {
    const p = document.createElement('div');
    p.className = 'pill';
    p.dataset.genre = g.id;
    p.dataset.dynamic = '1';
    p.textContent = g.name;
    p.onclick = () => selectGenre(g.id, p);
    pills.appendChild(p);
  });
}

function selectGenre(id, el) {
  currentGenre = id;
  currentPage = 1;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  enterFilterMode();
  loadGrid(true);
}

// ─── TYPE SWITCH ─────────────────────────────────────────────────────────────
function switchType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentGenre = '';
  currentPage = 1;
  isSearchMode = false;
  isFilterMode = false;
  document.getElementById('search-input').value = '';

  // rebuild pills for new type
  const pills = document.getElementById('genre-pills');
  [...pills.querySelectorAll('[data-dynamic]')].forEach(p=>p.remove());
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelector('.pill[data-genre=""]').classList.add('active');
  buildGenrePills();

  showHomeMode();
  loadHomeRows();
}

// ─── MODES ──────────────────────────────────────────────────────────────────
function showHomeMode() {
  isFilterMode = false;
  isSearchMode = false;
  document.getElementById('home-rows').style.display = '';
  document.getElementById('filter-mode').style.display = 'none';
  document.getElementById('search-mode').style.display = 'none';
}

function enterFilterMode() {
  isFilterMode = true;
  isSearchMode = false;
  document.getElementById('home-rows').style.display = 'none';
  document.getElementById('filter-mode').style.display = '';
  document.getElementById('search-mode').style.display = 'none';
}

function enterSearchMode() {
  isSearchMode = true;
  isFilterMode = false;
  document.getElementById('home-rows').style.display = 'none';
  document.getElementById('filter-mode').style.display = 'none';
  document.getElementById('search-mode').style.display = '';
}

function goHome() {
  document.getElementById('search-input').value = '';
  currentGenre = '';
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelector('.pill[data-genre=""]').classList.add('active');
  showHomeMode();
  if (document.getElementById('home-rows').children.length === 0) loadHomeRows();
}

// ─── NAV BUTTONS ─────────────────────────────────────────────────────────────
document.querySelectorAll('nav button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const cat = currentType === 'tv' && btn.dataset.tvCat ? btn.dataset.tvCat : btn.dataset.cat;
    currentCat = cat;
    currentPage = 1;
    currentGenre = '';
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    document.querySelector('.pill[data-genre=""]').classList.add('active');
    const labels = { popular:'Popular', now_playing:'En cines', top_rated:'Mejor valoradas', upcoming:'Próximas', on_the_air:'En emisión', airing_today:'Hoy en TV' };
    document.getElementById('section-title').textContent = labels[cat] || cat;
    enterFilterMode();
    loadGrid(true);
  };
});

// ─── HOME ROWS ───────────────────────────────────────────────────────────────
const MOVIE_ROWS = [
  { title:'🔥 Tendencias', endpoint:'trending/movie/week' },
  { title:'⭐ Mejor valoradas de todos los tiempos', endpoint:'movie/top_rated' },
  { title:'🎬 Clásicos de acción', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&with_genres=28&vote_average.gte=7&primary_release_date.lte=2010-01-01' },
  { title:'😂 Las mejores comedias', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&with_genres=35&vote_average.gte=7' },
  { title:'😱 Terror y suspenso', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&with_genres=27' },
  { title:'🚀 Ciencia ficción épica', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&with_genres=878&vote_average.gte=7' },
  { title:'🏆 Oscar — Mejor Película', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&with_genres=18&vote_average.gte=8' },
  { title:'🕹️ Animación para todos', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&with_genres=16&vote_average.gte=7' },
  { title:'📺 Documentales imperdibles', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&with_genres=99&vote_average.gte=7' },
  { title:'🌍 Cine internacional', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&without_original_language=en&vote_average.gte=7.5' },
  { title:'🎭 Los 90s inmortales', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&primary_release_date.gte=1990-01-01&primary_release_date.lte=1999-12-31&vote_average.gte=7' },
  { title:'🕰️ Grandes del siglo XX', endpoint:'discover/movie', params:'&sort_by=vote_count.desc&primary_release_date.lte=1989-12-31&vote_average.gte=7.5' },
];

const TV_ROWS = [
  { title:'🔥 Series en tendencia', endpoint:'trending/tv/week' },
  { title:'⭐ Las mejor valoradas', endpoint:'tv/top_rated' },
  { title:'🇰🇷 K-Dramas — Coreano', endpoint:'discover/tv', params:'&with_original_language=ko&sort_by=vote_count.desc&vote_average.gte=7' },
  { title:'🎭 Drama imperdible', endpoint:'discover/tv', params:'&with_genres=18&sort_by=vote_count.desc&vote_average.gte=7.5' },
  { title:'😂 Comedias que enganchan', endpoint:'discover/tv', params:'&with_genres=35&sort_by=vote_count.desc&vote_average.gte=7' },
  { title:'🕵️ Crimen y misterio', endpoint:'discover/tv', params:'&with_genres=80&sort_by=vote_count.desc&vote_average.gte=7' },
  { title:'🚀 Ciencia ficción & Fantasía', endpoint:'discover/tv', params:'&with_genres=10765&sort_by=vote_count.desc&vote_average.gte=7' },
  { title:'📺 Series de culto — Clásicos', endpoint:'discover/tv', params:'&sort_by=vote_count.desc&first_air_date.lte=2010-12-31&vote_average.gte=8' },
  { title:'🌏 Cine en español', endpoint:'discover/tv', params:'&with_original_language=es&sort_by=vote_count.desc&vote_average.gte=7' },
];

async function loadHomeRows() {
  const container = document.getElementById('home-rows');
  container.innerHTML = '';
  const rows = currentType === 'movie' ? MOVIE_ROWS : TV_ROWS;
  let heroSet = false;

  for (const row of rows) {
    const section = document.createElement('div');
    section.className = 'netflix-section';
    const skels = Array(8).fill('<div class="skeleton"></div>').join('');
    section.innerHTML = `
      <div class="row-header">
        <span class="row-title">${row.title}</span>
      </div>
      <div class="row-scroll" id="row-${rows.indexOf(row)}">${skels}</div>`;
    container.appendChild(section);

    fetchRow(row, rows.indexOf(row), !heroSet).then(hasItems => {
      if (hasItems && !heroSet) heroSet = true;
    });
  }
}

async function fetchRow(row, idx, setHero) {
  try {
    const params = row.params || '';
    const url = `${BASE}/${row.endpoint}?api_key=${API_KEY}&language=es&page=1${params}`;
    const r = await fetch(url);
    const d = await r.json();
    const items = d.results || [];
    const rowEl = document.getElementById(`row-${idx}`);
    if (!rowEl) return false;
    rowEl.innerHTML = '';
    if (!items.length) { rowEl.closest('.netflix-section').style.display='none'; return false; }
    if (setHero) setHeroItem(items[0]);
    items.slice(0,20).forEach(item => {
      rowEl.appendChild(buildCard(item, false));
    });
    return true;
  } catch(e) { return false; }
}

// ─── GRID MODE ────────────────────────────────────────────────────────────────
async function loadGrid(reset=false) {
  if (reset) { currentPage=1; document.getElementById('movies-grid').innerHTML=''; document.getElementById('load-more-wrap').style.display='none'; }
  document.getElementById('loader').style.display='block';
  try {
    let url;
    if (currentGenre === 'korean') {
      url = `${BASE}/discover/${currentType}?api_key=${API_KEY}&language=es&with_original_language=ko&sort_by=popularity.desc&page=${currentPage}`;
    } else if (currentGenre) {
      url = `${BASE}/discover/${currentType}?api_key=${API_KEY}&language=es&sort_by=popularity.desc&with_genres=${currentGenre}&page=${currentPage}`;
    } else {
      const ep = currentType === 'movie' ? `movie/${currentCat}` : `tv/${currentCat}`;
      url = `${BASE}/${ep}?api_key=${API_KEY}&language=es&page=${currentPage}`;
    }
    const r = await fetch(url);
    const d = await r.json();
    totalPages = Math.min(d.total_pages||1, 10);
    const grid = document.getElementById('movies-grid');
    if (!d.results?.length && reset) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">◎</div><div class="empty-title">Sin resultados</div></div>';
    } else {
      (d.results||[]).forEach((item,i) => {
        const card = buildCard(item, true);
        card.style.animationDelay = `${(i%20)*0.03}s`;
        card.style.animation = 'fadeUp 0.4s ease both';
        grid.appendChild(card);
      });
    }
    document.getElementById('load-more-wrap').style.display = currentPage < totalPages ? 'block' : 'none';
  } catch(e) { showToast('Error al cargar'); }
  document.getElementById('loader').style.display='none';
}

function loadMoreGrid() { currentPage++; loadGrid(false); }

// ─── SEARCH ──────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { goHome(); return; }
  searchTimer = setTimeout(() => doSearch(q), 480);
});
document.getElementById('search-btn').onclick = () => {
  const q = document.getElementById('search-input').value.trim();
  if (q) doSearch(q);
};

async function doSearch(q) {
  enterSearchMode();
  document.getElementById('search-title').textContent = `"${q}"`;
  document.getElementById('search-grid').innerHTML = '';
  document.getElementById('search-loader').style.display='block';
  try {
    const [mr, tr] = await Promise.all([
      fetch(`${BASE}/search/movie?api_key=${API_KEY}&language=es&query=${encodeURIComponent(q)}&page=1`),
      fetch(`${BASE}/search/tv?api_key=${API_KEY}&language=es&query=${encodeURIComponent(q)}&page=1`)
    ]);
    const md = await mr.json();
    const td = await tr.json();
    const movies = (md.results||[]).map(x=>({...x,_type:'movie'}));
    const tvs = (td.results||[]).map(x=>({...x,_type:'tv'}));
    const merged = [...movies,...tvs].sort((a,b)=>b.popularity-a.popularity);
    const grid = document.getElementById('search-grid');
    if (!merged.length) {
      grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">◎</div><div class="empty-title">Sin resultados</div></div>';
    } else {
      merged.forEach(item => grid.appendChild(buildCard(item,true)));
    }
  } catch(e) { showToast('Error en búsqueda'); }
  document.getElementById('search-loader').style.display='none';
}

// ─── CARD BUILDER ─────────────────────────────────────────────────────────────
function buildCard(item, isGrid) {
  const type = item._type || (item.first_air_date !== undefined ? 'tv' : 'movie');
  const title = item.title || item.name || 'Sin título';
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '—';
  const card = document.createElement('div');
  card.className = isGrid ? 'movie-card grid-card' : 'movie-card';
  card.onclick = () => openModal(item.id, type);
  const typeLabel = type === 'tv' ? 'Serie' : 'Película';
  if (item.poster_path) {
    card.innerHTML = `
      <img src="${IMG}${item.poster_path}" alt="${title}" loading="lazy">
      <div class="card-play">▶</div>
      <div class="card-overlay">
        <div class="card-title">${title}</div>
        <div class="card-meta">
          <span class="card-rating">★ ${rating}</span>
          <span>${year}</span>
          <span class="card-type-badge">${typeLabel}</span>
        </div>
      </div>`;
  } else {
    card.innerHTML = `
      <div class="no-poster">
        <div class="no-poster-icon">🎬</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:0.05em;color:var(--text);margin-top:0.2rem;text-align:center">${title}</div>
        <div style="font-size:0.68rem;margin-top:0.15rem">${year}</div>
      </div>
      <div class="card-play">▶</div>
      <div class="card-overlay">
        <div class="card-title">${title}</div>
        <div class="card-meta"><span class="card-rating">★ ${rating}</span><span>${year}</span><span class="card-type-badge">${typeLabel}</span></div>
      </div>`;
  }
  return card;
}

// ─── HERO ────────────────────────────────────────────────────────────────────
function setHeroItem(item) {
  heroItem = item;
  const type = item._type || (item.first_air_date !== undefined ? 'tv' : 'movie');
  heroItem._type = type;
  const bg = document.getElementById('hero-bg');
  const src = item.backdrop_path ? `${IMG_BIG}${item.backdrop_path}` : (item.poster_path ? `${IMG}${item.poster_path}` : '');
  if (src) bg.style.backgroundImage = `url(${src})`;
  const title = item.title || item.name || '';
  document.getElementById('hero-title').textContent = title;
  document.getElementById('hero-badge').textContent = type === 'tv' ? 'Serie destacada' : 'Película destacada';
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const rating = item.vote_average ? `★ ${item.vote_average.toFixed(1)}` : '';
  document.getElementById('hero-meta').textContent = [year,rating].filter(Boolean).join('  ·  ');
  document.getElementById('hero-overview').textContent = item.overview || '';
}

async function playHeroTrailer() { if (heroItem) await openModal(heroItem.id, heroItem._type||'movie', true); }
async function openHeroModal() { if (heroItem) await openModal(heroItem.id, heroItem._type||'movie', false); }

// ─── MODAL ────────────────────────────────────────────────────────────────────
async function openModal(id, type, autoplay=false) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  resetModal();

  try {
    const [detailRes, videoRes] = await Promise.all([
      fetch(`${BASE}/${type}/${id}?api_key=${API_KEY}&language=es&append_to_response=external_ids`),
      fetch(`${BASE}/${type}/${id}/videos?api_key=${API_KEY}&language=es`)
    ]);
    const detail = await detailRes.json();
    let videos = (await videoRes.json()).results || [];

    // Fallback to EN videos if no ES trailer
    let trailer = videos.find(v=>v.type==='Trailer'&&v.site==='YouTube')
                || videos.find(v=>v.site==='YouTube');
    if (!trailer) {
      const enR = await fetch(`${BASE}/${type}/${id}/videos?api_key=${API_KEY}&language=en`);
      const enV = (await enR.json()).results || [];
      trailer = enV.find(v=>v.type==='Trailer'&&v.site==='YouTube')
             || enV.find(v=>v.site==='YouTube');
    }
    currentTrailerKey = trailer?.key || null;

    // Backdrop
    const bdSrc = detail.backdrop_path ? `${IMG_BIG}${detail.backdrop_path}` : '';
    const bdEl = document.getElementById('modal-backdrop');
    if (bdSrc) { bdEl.src = bdSrc; bdEl.style.display='block'; document.getElementById('modal-backdrop-ph').style.display='none'; }
    else { bdEl.style.display='none'; document.getElementById('modal-backdrop-ph').style.display='flex'; }

    // Poster
    const posterEl = document.getElementById('modal-poster');
    const posterPh = document.getElementById('modal-poster-ph');
    if (detail.poster_path) { posterEl.src = `${IMG}${detail.poster_path}`; posterEl.style.display='block'; posterPh.style.display='none'; }
    else { posterEl.style.display='none'; posterPh.style.display='flex'; }

    // Title & tagline
    const title = detail.title || detail.name || 'Sin título';
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-tagline').textContent = detail.tagline || '';

    // Stats
    const runtime = detail.runtime ? `${Math.floor(detail.runtime/60)}h ${detail.runtime%60}m`
                  : detail.episode_run_time?.[0] ? `~${detail.episode_run_time[0]}m/ep` : '—';
    const year = (detail.release_date||detail.first_air_date||'').slice(0,4);
    const seasons = detail.number_of_seasons ? `${detail.number_of_seasons} temporadas` : null;
    document.getElementById('modal-stats').innerHTML = `
      <div class="stat"><span class="stat-label">Calificación</span><span class="stat-value gold">★ ${detail.vote_average?.toFixed(1)||'—'} <span style="color:var(--muted);font-size:0.7rem">(${(detail.vote_count||0).toLocaleString()})</span></span></div>
      <div class="stat"><span class="stat-label">Año</span><span class="stat-value">${year||'—'}</span></div>
      <div class="stat"><span class="stat-label">Duración</span><span class="stat-value">${runtime}</span></div>
      ${seasons?`<div class="stat"><span class="stat-label">Temporadas</span><span class="stat-value">${seasons}</span></div>`:''}
      <div class="stat"><span class="stat-label">Idioma</span><span class="stat-value">${(detail.original_language||'').toUpperCase()||'—'}</span></div>
    `;

    // Genres
    const genresDiv = document.getElementById('modal-genres');
    (detail.genres||[]).forEach(g=>{ const t=document.createElement('span'); t.className='genre-tag'; t.textContent=g.name; genresDiv.appendChild(t); });

    // Overview
    document.getElementById('modal-overview').textContent = detail.overview || 'Sin sinopsis disponible.';

    // IMDb
    const imdbId = detail.imdb_id || detail.external_ids?.imdb_id || null;
    currentImdbId = imdbId;
    currentPlayImdbUrl = imdbId ? `https://www.playimdb.com/es/title/${imdbId}/` : null;

    // Watch providers
    let providers = [];
    try {
      const provRes = await fetch(`${BASE}/${type}/${id}/watch/providers?api_key=${API_KEY}`);
      const provData = await provRes.json();
      const countryData = provData.results?.[userCountry] || provData.results?.['US'] || null;
      if (countryData?.flatrate?.length) {
        providers = countryData.flatrate.map(p => ({
          name: p.provider_name,
          logo: `https://image.tmdb.org/t/p/original${p.logo_path}`,
          link: countryData.link || '#'
        }));
      }
    } catch(e) {}

    // Actions
    buildModalActions(currentTrailerKey, imdbId, providers);

    // Autoplay
    if (autoplay && currentTrailerKey) playTrailer(currentTrailerKey);

  } catch(e) {
    document.getElementById('modal-title').textContent = 'Error al cargar';
    showToast('No se pudo cargar la información');
  }
}

function buildModalActions(trailerKey, imdbId, providers) {
  const actions = document.getElementById('modal-actions');
  actions.innerHTML = '';

  if (trailerKey) {
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.innerHTML = '▶ Tráiler';
    btn.onclick = () => playTrailer(trailerKey);
    actions.appendChild(btn);
  }

  if (imdbId) {
    const verBtn = document.createElement('button');
    verBtn.className = 'btn-ver';
    verBtn.innerHTML = '▶ VER';
    verBtn.title = 'Ver en PlayIMDb';
    verBtn.onclick = () => window.open(`https://www.playimdb.com/es/title/${imdbId}/`, '_blank');
    actions.appendChild(verBtn);

    const imdbBtn = document.createElement('button');
    imdbBtn.className = 'btn-secondary';
    imdbBtn.innerHTML = 'IMDb ↗';
    imdbBtn.onclick = () => window.open(`https://www.imdb.com/es/title/${imdbId}`, '_blank');
    actions.appendChild(imdbBtn);
  }

  // Streaming providers
  const provSection = document.getElementById('providers-section');
  const provRow = document.getElementById('providers-row');
  provRow.innerHTML = '';

  if (providers && providers.length > 0) {
    provSection.style.display = 'block';
    providers.forEach(p => {
      const a = document.createElement('a');
      a.className = 'provider-btn';
      a.href = p.link;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `<img src="${p.logo}" alt="${p.name}" onerror="this.style.display='none'"><span class="pname">${p.name}</span>`;
      provRow.appendChild(a);
    });
  } else {
    provSection.style.display = 'none';
  }
}

function playTrailer(key) {
  const frame = document.getElementById('trailer-frame');
  const bd = document.getElementById('modal-backdrop');
  const ph = document.getElementById('modal-backdrop-ph');
  const errMsg = document.getElementById('trailer-error');

  frame.style.display = 'block';
  bd.style.display = 'none';
  ph.style.display = 'none';
  errMsg.style.display = 'none';

  // Use privacy-enhanced YouTube embed + origin param
  frame.src = `https://www.youtube-nocookie.com/embed/${key}?autoplay=1&rel=0&modestbranding=1`;

  // Set YouTube fallback button
  document.getElementById('yt-fallback-btn').onclick = () => window.open(`https://www.youtube.com/watch?v=${key}`, '_blank');

  // Listen for errors via postMessage
  frame.onerror = () => showTrailerError();

  document.getElementById('modal').scrollTop = 0;
}

function showTrailerError() {
  document.getElementById('trailer-frame').style.display = 'none';
  document.getElementById('trailer-error').style.display = 'block';
}

function resetModal() {
  currentTrailerKey = null; currentImdbId = null; currentPlayImdbUrl = null;
  document.getElementById('modal-backdrop').src = '';
  document.getElementById('modal-backdrop').style.display = 'block';
  document.getElementById('modal-backdrop-ph').style.display = 'none';
  document.getElementById('modal-poster').src = '';
  document.getElementById('modal-poster').style.display = 'block';
  document.getElementById('modal-poster-ph').style.display = 'none';
  document.getElementById('trailer-frame').style.display = 'none';
  document.getElementById('trailer-frame').src = '';
  document.getElementById('trailer-error').style.display = 'none';
  document.getElementById('modal-title').textContent = 'Cargando...';
  document.getElementById('modal-tagline').textContent = '';
  document.getElementById('modal-stats').innerHTML = '';
  document.getElementById('modal-genres').innerHTML = '';
  document.getElementById('modal-overview').textContent = '';
  document.getElementById('modal-actions').innerHTML = '';
  document.getElementById('providers-section').style.display = 'none';
  document.getElementById('providers-row').innerHTML = '';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('trailer-frame').src = '';
  document.body.style.overflow = '';
}
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ─── UTILS ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ─── START ───────────────────────────────────────────────────────────────────
init();
</script>
